<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Space Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            height: 100vh;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. Scene Setup ---
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.008);

        // --- 2. Star Field (same twinkle/shine mechanism as original — untouched) ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1200; // kept exactly as requested — same quantity, not changed
        const positions = new Float32Array(starCount * 3);
        const sizes = new Float32Array(starCount);
        const randoms = new Float32Array(starCount);

        for (let i = 0; i < starCount; i++) {
            const radius = 50 + Math.random() * 150;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);

            // Slightly bigger than original (was 0.5–2.0) so 1500 stars still fill the space well
            sizes[i] = Math.random() * 4.0 + 3.0;
            randoms[i] = Math.random();
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        starGeometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMouse: { value: new THREE.Vector2(10, 10) },
                uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
            },
            vertexShader: `
                uniform vec2 uMouse;
                uniform float uTime;
                uniform float uPixelRatio;
                attribute float size;
                attribute float aRandom;
                varying float vGlow;
                varying float vRandom;

                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_Position = projectionMatrix * mvPosition;

                    vec2 screenPos = gl_Position.xy / gl_Position.w;
                    float dist = distance(screenPos, uMouse);

                    float proximity = 1.0 - smoothstep(0.0, 0.15, dist);
                    vGlow = proximity;
                    vRandom = aRandom;

                    float twinkle = sin(uTime * 2.0 + aRandom * 10.0) * 0.5 + 0.5;

                    float finalSize = size * (1.0 + proximity * 1.5) * (0.8 + twinkle * 0.4);
                    gl_PointSize = finalSize * uPixelRatio * (300.0 / -mvPosition.z);
                }
            `,
            fragmentShader: `
                varying float vGlow;
                varying float vRandom;

                void main() {
                    vec2 uv = gl_PointCoord - 0.5;
                    float dist = length(uv);

                    float core = smoothstep(0.1, 0.0, dist);

                    float spikeX = smoothstep(0.5, 0.0, abs(uv.y) * 8.0) * smoothstep(0.5, 0.0, abs(uv.x));
                    float spikeY = smoothstep(0.5, 0.0, abs(uv.x) * 8.0) * smoothstep(0.5, 0.0, abs(uv.y));
                    float spikes = max(spikeX, spikeY) * 0.5;

                    float strength = core + spikes;
                    strength += vGlow * (core * 2.0 + spikes * 4.0);

                    if (strength < 0.01) discard;

                    vec3 colorWhite = vec3(1.0);
                    vec3 colorBlue = vec3(0.7, 0.85, 1.0);
                    vec3 colorYellow = vec3(1.0, 0.95, 0.8);

                    vec3 starColor = mix(colorWhite, colorBlue, vRandom);
                    starColor = mix(starColor, colorYellow, step(0.8, vRandom));

                    gl_FragColor = vec4(starColor, strength);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // --- 3. Interaction Logic ---
        const mouse = { x: 10, y: 10 };
        const cameraPos = { x: 0, y: 0 };

        // Scroll-driven movement — normalized 0 (top) to 1 (bottom)
        const scrollState = { target: 0, current: 0 };

        // Direct mouse/touch listeners — work when this file is opened standalone (not in an iframe)
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: true });

        // Mouse position forwarded from the parent page via postMessage —
        // needed because this iframe has pointer-events:none, so it never
        // receives real mouse events of its own when embedded in index.html
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'mouse-move') {
                mouse.x = e.data.x;
                mouse.y = e.data.y;
            }
            if (e.data && e.data.type === 'scroll-move') {
                scrollState.target = e.data.y; // 0..1
            }
        });

        // Direct scroll listener — works when this file is opened standalone
        window.addEventListener('scroll', () => {
            const max = document.documentElement.scrollHeight - window.innerHeight;
            scrollState.target = max > 0 ? window.scrollY / max : 0;
        }, { passive: true });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            starMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
        });

        // --- 4. Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            starMaterial.uniforms.uTime.value = elapsedTime;
            starMaterial.uniforms.uMouse.value.x += (mouse.x - starMaterial.uniforms.uMouse.value.x) * 0.1;
            starMaterial.uniforms.uMouse.value.y += (mouse.y - starMaterial.uniforms.uMouse.value.y) * 0.1;

            cameraPos.x += (mouse.x * 1.5 - cameraPos.x) * 0.05;
            cameraPos.y += (mouse.y * 1.5 - cameraPos.y) * 0.05;

            // Smoothly ease toward the latest scroll position
            scrollState.current += (scrollState.target - scrollState.current) * 0.06;

            camera.position.x = cameraPos.x;
            camera.position.y = cameraPos.y;
            // Push the camera through the star field as the page scrolls,
            // and add a slow roll so the movement feels alive rather than a flat zoom
            camera.position.z = 15 - scrollState.current * 40;
            stars.rotation.y = scrollState.current * 1.2;
            stars.rotation.x = scrollState.current * 0.4;

            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
